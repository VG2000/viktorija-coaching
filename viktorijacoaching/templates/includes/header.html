{% load wagtailcore_tags %}
{% wagtail_site as current_site %}

<header x-data="{ open: false, scrolled: false, darkNav: document.body.classList.contains('nav-dark') }"
        x-init="window.addEventListener('scroll', () => { scrolled = window.scrollY > 50 })"
        :class="scrolled ? 'bg-white/95 shadow-sm backdrop-blur-sm' : 'bg-transparent'"
        class="fixed top-0 left-0 right-0 z-50 transition-all duration-500">
    <nav class="max-w-7xl mx-auto px-6 lg:px-12">
        <div class="flex items-center justify-between h-20 lg:h-24">
            {# Logo #}
            <a href="/" class="flex items-center">
                <span class="font-heading text-2xl lg:text-3xl font-semibold transition-colors duration-300"
                      :class="scrolled || darkNav ? 'text-navy' : 'text-white'">
                    Viktorija Coaching
                </span>
            </a>

            {# Desktop Navigation #}
            <div class="hidden lg:flex items-center space-x-10">
                <a href="/about/"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    About
                </a>
                <a href="#services"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    Work With Me
                </a>
                <a href="#"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    Freebies
                </a>
                <a href="#"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    Podcast
                </a>
                <a href="#contact"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    Connect
                </a>
                <a href="/home-2/"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em]"
                   :class="scrolled || darkNav ? 'text-navy/70 hover:text-navy' : 'text-white/80 hover:text-white'">
                    Homepage 2
                </a>
                <a href="/book/"
                   class="nav-link transition-colors duration-300 font-body text-[11px] uppercase tracking-[0.25em] border px-4 py-2"
                   :class="scrolled || darkNav ? 'text-navy border-navy hover:bg-navy hover:text-white' : 'text-white border-white hover:bg-white hover:text-navy'">
                    Book
                </a>
            </div>

            {# Mobile Hamburger #}
            <button @click="open = !open"
                    class="lg:hidden focus:outline-none transition-colors duration-300"
                    :class="scrolled || darkNav ? 'text-navy' : 'text-white'"
                    aria-label="Toggle menu">
                <svg x-show="!open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg x-show="open" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        {# Mobile Menu #}
        <div x-show="open"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             x-cloak
             class="lg:hidden bg-white/95 backdrop-blur-sm pb-8 -mx-6 px-6">
            <div class="flex flex-col space-y-5 pt-4 border-t border-gray-200/50">
                <a href="/about/" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    About
                </a>
                <a href="#services" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    Work With Me
                </a>
                <a href="#" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    Freebies
                </a>
                <a href="#" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    Podcast
                </a>
                <a href="#contact" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    Connect
                </a>
                <a href="/home-2/" @click="open = false"
                   class="text-navy/70 hover:text-navy font-body text-[11px] uppercase tracking-[0.25em] transition-colors duration-300">
                    Homepage 2
                </a>
                <a href="/book/" @click="open = false"
                   class="text-navy border border-navy font-body text-[11px] uppercase tracking-[0.25em] px-4 py-2 text-center hover:bg-navy hover:text-white transition-colors duration-300">
                    Book
                </a>
            </div>
        </div>
    </nav>
</header>
