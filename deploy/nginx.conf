server {
    listen 80;
    server_name viktorija.vincegomez.com;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name viktorija.vincegomez.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/viktorija.vincegomez.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viktorija.vincegomez.com/privkey.pem;

    client_max_body_size 20M;

    # Static files served by nginx
    location /static/ {
        alias /home/ubuntu/viktorija-coaching/staticfiles/;
        etag on;
        add_header Cache-Control "no-cache";
    }

    # Media files
    location /media/ {
        alias /home/ubuntu/viktorija-coaching/media/;
        expires 7d;
    }

    # Proxy to Django/gunicorn on port 8010 (8000 is used by vincegomez.com)
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
